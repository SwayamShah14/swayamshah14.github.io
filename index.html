<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swayam Shah</title>
  <style>
    :root {
      --bg:      #f5f0e8;
      --text:    #2c1a0e;
      --muted:   #7a6050;
      --accent:  #8b6914;
      --rule:    #c8b89a;
    }
    [data-theme="dark"] {
      --bg:      #1a1209;
      --text:    #e8dfc8;
      --muted:   #a09070;
      --accent:  #c8a040;
      --rule:    #3a2c1a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, "Courier New", monospace;
      font-size: 14px;
      line-height: 1.75;
      transition: background 0.2s, color 0.2s;
    }
    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <!-- content goes here -->
  </main>
</body>
</html>
